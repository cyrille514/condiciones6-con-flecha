<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
  </script>

  <style type="text/tailwindcss">
    @import "tailwindcss"; 

 @layer base {
      button {
        @apply rounded-md bg-slate-200 border-1 border-slate-400  px-4 py-1 my-5 mx-5 text-sm cursor-pointer disabled:opacity-50
      }

    }
    
  </style>
    <title>Restaurante</title>
</head>
        
<body class="bg-blue-300 min-h-screen flex items-center justify-center p-4">
    
    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-stone-200">
        <h1 class="text-2xl font-bold text-stone-800 text-center mb-6">🍽️ Menu del Dia</h1>
        
        <form id="formRestaurante" onsubmit="procesarPedido(event)" class="space-y-6">
            
            
            <div>
                <label for="plato" class="block text-sm font-semibold text-stone-600 mb-1">Selecciona tu plato</label>
                <select id="plato" required 
                        class="w-full px-4 py-2 border border-stone-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-amber-500">
                    <option value="carne">Carne</option>
                    <option value="pasta">Pasta</option>
                    <option value="risotto">Risotto</option>
                </select>
            </div>

            <div>
                <span class="block text-sm font-semibold text-stone-600 mb-2"> intolerancias o preferencias:</span>
                <div class="space-y-2">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" id="vegano" class="rounded text-amber-600 focus:ring-amber-500">
                        <span class="text-sm text-stone-700">Vegano</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" id="gluten" class="rounded text-amber-600 focus:ring-amber-500">
                        <span class="text-sm text-stone-700">Intolerancia al gluten</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" id="lactosa" class="rounded text-amber-600 focus:ring-amber-500">
                        <span class="text-sm text-stone-700">Intolerancia a la lactosa</span>
                    </label>
                </div>
            </div>

            <button type="submit" 
                    class="w-full bg-amber-600 text-white font-medium py-2 rounded-lg hover:bg-amber-700 transition duration-200 cursor-pointer">
                Confirmar Pedido
            </button>
        </form>

        <p id="parrafoResultado" class="mt-6 p-4 rounded-lg text-center font-medium hidden"></p>
    </div>

    <script src="./js/app.js"></script>
</body>
</html>
